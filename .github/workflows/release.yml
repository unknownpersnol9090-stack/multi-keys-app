name: Android Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0)'
        required: false
        default: '1.0.0'

jobs:
  release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js + pnpm ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.4.1 --activate

      # ── 4. Install Node dependencies ──────────────────────────────────────────
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Create placeholder web dist ────────────────────────────────────────
      - name: Create placeholder dist/
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><title>Multi Keys App</title></head><body></body></html>' > dist/index.html

      # ── 6. Generate Android native project ────────────────────────────────────
      - name: Add Android platform (cap add android)
        run: pnpm exec cap add android

      # ── 7. Sync Capacitor plugins & config ────────────────────────────────────
      - name: Sync Capacitor (cap sync android)
        run: pnpm exec cap sync android

      # ── 8. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ── 9. Gradle cache ───────────────────────────────────────────────────────
      # ── 10. Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-keys-app-release-${{ github.ref_name || github.run_number }}
          path: multi-keys-app-*.apk
          retention-days: 90

      # ── 11. Create GitHub Release (only on version tags) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: multi-keys-app-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
