        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 7b. Unsigned release (fallback when no signing secrets configured) ────
      - name: Build unsigned release APK (no keystore configured)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 8. Resolve APK path (signed or unsigned) ──────────────────────────────
      - name: Find release APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      # ── 9. Rename APK with version ────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          fi
          VERSION="${VERSION#v}"
          cp "${{ steps.find_apk.outputs.apk_path }}" "multi-keys-app-${VERSION}.apk"

      # ── 10. Upload APK as workflow artifact ───────────────────────────────────
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-keys-app-release-${{ github.ref_name || github.run_number }}
          path: multi-keys-app-*.apk
          retention-days: 90

      # ── 11. Create GitHub Release (only on version tags) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: multi-keys-app-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
