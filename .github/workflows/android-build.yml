name: Android Build (Debug APK)

on:
push:
branches:
- ''
pull_request:
branches:
- ''
workflow_dispatch:

jobs:
build:
name: Build Debug APK
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Java 21
    uses: actions/setup-java@v4
    with:
      java-version: '21'
      distribution: 'temurin'

  - name: Set up Node.js 22
    uses: actions/setup-node@v4
    with:
      node-version: '22'

  - name: Enable pnpm
    run: corepack enable && corepack prepare pnpm@10.4.1 --activate

  - name: Install Node dependencies
    run: pnpm install --frozen-lockfile

  - name: Create placeholder dist
    run: |
      mkdir -p dist
      echo '<!DOCTYPE html><html><body></body></html>' > dist/index.html

  - name: Sync Capacitor Android
    run: pnpm exec cap sync android

  - name: Set up Android SDK
    uses: android-actions/setup-android@v3

  - name: Install Android SDK packages
    run: |
      sdkmanager --install \
        "platform-tools" \
        "platforms;android-36" \
        "build-tools;36.0.0"

  - name: Cache Gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
      restore-keys: |
        ${{ runner.os }}-gradle-

  - name: Make gradlew executable
    run: chmod +x android/gradlew

  - name: Build debug APK
    working-directory: android
    run: ./gradlew assembleDebug --no-daemon --stacktrace

  - name: Upload debug APK
    uses: actions/upload-artifact@v4
    with:
      name: multi-keys-app-debug-${{ github.run_id }}
      path: android/app/build/outputs/apk/debug/app-debug.apk
      retention-days: 30
